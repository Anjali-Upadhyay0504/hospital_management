{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Hospital Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>
<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-4">

            <div class="card shadow p-4">

                <h3 class="text-center mb-4">Login</h3>

                <input id="username" class="form-control mb-3" placeholder="Username">

                <input id="password" type="password" class="form-control mb-3" placeholder="Password">

                <button id="loginBtn" onclick="login()" class="btn btn-primary w-100">
                    Login
                </button>

                <a href="/signup/" class="mt-3 text-center d-block">
                    Create Account
                </a>

                <div id="msg" class="text-center mt-3"></div>

            </div>

        </div>

    </div>

</div>

<script src="/static/js/common.js"></script>
<script src="/static/js/auth.js"></script>
<script src="{% static 'js/auth-guard.js' %}">
    
</script> <script src="{% static 'js/login.js' %}"></script>
</body>
</html>
