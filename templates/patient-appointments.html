{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Appointments</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet">

</head>

<body class="bg-light">

<!-- ==========================
        NAVBAR
========================== -->

<nav class="navbar navbar-dark bg-primary">

    <div class="container">

        <a class="navbar-brand fw-bold">

            🏥 MedCare

        </a>

        <div>

            <a href="/patient-dashboard/"
               class="btn btn-light">

                <i class="bi bi-arrow-left"></i>

                Dashboard

            </a>

        </div>

    </div>

</nav>

<div class="container py-4">

    <!-- ==========================
            HEADER
    ========================== -->

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h2 class="fw-bold mb-1">

                My Appointments

            </h2>

            <p class="text-muted mb-0">

                View all your appointments

            </p>

        </div>

        <button
            class="btn btn-primary"
            onclick="loadAppointments()">

            <i class="bi bi-arrow-clockwise"></i>

            Refresh

        </button>

    </div>

    <!-- ==========================
            FILTERS
    ========================== -->

    <div class="card shadow-sm mb-4">

        <div class="card-body">

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Search Doctor

                    </label>

                    <input
                        type="text"
                        id="searchInput"
                        class="form-control"
                        placeholder="Search doctor..."
                    >

                </div>

                <div class="col-md-4 mb-3">

                    <label class="form-label">

                        Status

                    </label>

                    <select
                        id="statusFilter"
                        class="form-select">

                        <option value="">

                            All

                        </option>

                        <option value="pending">

                            Pending

                        </option>

                        <option value="approved">

                            Approved

                        </option>

                        <option value="completed">

                            Completed

                        </option>

                        <option value="cancelled">

                            Cancelled

                        </option>

                        <option value="rejected">

                            Rejected

                        </option>

                    </select>

                </div>

                <div class="col-md-2 d-grid">

                    <label class="form-label">

                        &nbsp;

                    </label>

                    <button
                        class="btn btn-success"
                        id="filterBtn">

                        Apply

                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- ==========================
            TABLE
    ========================== -->

    <div class="card shadow-sm">

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-primary">

                        <tr>

                            <th>id</th>

                            <th>Doctor</th>

                            <th>Specialization</th>

                            <th>Date</th>

                            <th>Status</th>

                            <th>Action</th>

                        </tr>

                    </thead>

                    <tbody id="appointmentTable">

                        <tr>

                            <td colspan="6"
                                class="text-center py-5 text-muted">

                                Loading...

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- ==========================
            PAGINATION
    ========================== -->

    <div
        id="pagination"
        class="d-flex justify-content-center mt-4">

    </div>

</div>
   


<!-- Prescription Modal -->
<div class="modal fade" id="prescriptionModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Prescription</h5>
                <button type="button" class="btn-close"
                        data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <p><strong>Patient:</strong> <span id="viewPatient"></span></p>

                <p><strong>Doctor:</strong> <span id="viewDoctor"></span></p>

                <p><strong>Diagnosis:</strong> <span id="viewDiagnosis"></span></p>

                <p><strong>Medicines:</strong> <span id="viewMedicines"></span></p>

                <p><strong>Notes:</strong> <span id="viewNotes"></span></p>

                <p><strong>Date:</strong> <span id="viewDate"></span></p>

            </div>

        </div>
    </div>
</div>
<!-- ==========================
        BOOTSTRAP
========================== -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- ==========================
        COMMON JS
========================== -->

<script src="{% static 'js/common.js' %}"></script>

<script src="{% static 'js/auth.js' %}"></script>

<script src="{% static 'js/auth-guard.js' %}"></script>

<script src="{% static 'js/patient-appointments.js' %}"></script>

<script src="{% static 'js/notifications.js' %}"></script>
<script src="{% static 'js/patient-prescription.js' %}"></script>

</body>
</html>
