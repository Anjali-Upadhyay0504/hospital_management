{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>My Invoices</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body class="bg-light">

<div class="container py-4">

    <!-- Header -->

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>
            💳 My Invoices
        </h2>

        <a href="/patient-dashboard/"
           class="btn btn-secondary">

            ← Back

        </a>

    </div>

    <!-- Invoice Table -->

    <div class="card shadow border-0">

        <div class="card-header bg-warning text-dark">

            <h5 class="mb-0">
                Invoice History
            </h5>

        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-bordered table-hover align-middle">

                    <thead class="table-light">

                        <tr>

                            <th>Invoice No</th>

                            <th>Doctor</th>

                            <th>Total</th>

                            <th>Status</th>

                            <th>Created</th>

                            <th width="120">
                                Action
                            </th>

                        </tr>

                    </thead>

                    <tbody id="invoiceTableBody">

                        <tr>

                            <td colspan="6"
                                class="text-center">

                                Loading...

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>


<!-- ==========================
        INVOICE MODAL
========================== -->

<div class="modal fade"
     id="invoiceModal"
     tabindex="-1">

    <div class="modal-dialog modal-lg">

        <div class="modal-content">

            <div class="modal-header bg-warning">

                <h5 class="modal-title">

                    Invoice Details

                </h5>

                <button class="btn-close"
                        data-bs-dismiss="modal"></button>

            </div>

            <div class="modal-body"
                 id="invoicePrintArea">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="fw-bold">
                            Invoice Number
                        </label>

                        <div id="invoiceNumber"
                             class="form-control bg-light"></div>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="fw-bold">
                            Payment Status
                        </label>

                        <div id="paymentStatus"
                             class="form-control bg-light"></div>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="fw-bold">
                            Patient
                        </label>

                        <div id="invoicePatient"
                             class="form-control bg-light"></div>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="fw-bold">
                            Doctor
                        </label>

                        <div id="invoiceDoctor"
                             class="form-control bg-light"></div>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="fw-bold">
                            Consultation Fee
                        </label>

                        <div id="consultationFee"
                             class="form-control bg-light"></div>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="fw-bold">
                            Extra Charge
                        </label>

                        <div id="extraCharge"
                             class="form-control bg-light"></div>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="fw-bold">
                            Discount
                        </label>

                        <div id="discount"
                             class="form-control bg-light"></div>

                    </div>

                    <div class="col-12">

                        <label class="fw-bold">
                            Total Amount
                        </label>

                        <div id="totalAmount"
                             class="form-control bg-light fs-5 fw-bold"></div>

                    </div>

                </div>

            </div>

            <div class="modal-footer">

                <button class="btn btn-secondary"
                        data-bs-dismiss="modal">

                    Close

                </button>

                <button class="btn btn-warning"
                        onclick="printInvoice()">

                    <i class="bi bi-printer"></i>

                    Print

                </button>

            </div>

        </div>

    </div>

</div>


<script src="{% static 'js/common.js' %}"></script>

<script src="{% static 'js/auth.js' %}"></script>

<script src="{% static 'js/auth-guard.js' %}"></script>

<script src="{% static 'js/patient-invoice.js' %}"></script>
{% comment %} 
<script src="{% static 'js/patient-invoices.js' %}"></script> {% endcomment %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
