{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/doctordashboard.css' %}">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="brand">
        🏥 Doctor Panel
    </div>

    <a href="/doctor-dashboard/">
        <i class="bi bi-speedometer2"></i> Dashboard
    </a>

    <a href="/doctor/appointments/">
        <i class="bi bi-calendar-check"></i> Appointments
    </a>

    <a href="/doctor/schedule/">
        <i class="bi bi-clock"></i> Schedule
    </a>

    <a href="/doctor/prescriptions/">
        <i class="bi bi-capsule"></i> Prescriptions
    </a>

    <hr>

    <a href="#" onclick="logout()" class="text-danger">
        <i class="bi bi-box-arrow-right"></i> Logout
    </a>

</div>

<!-- MAIN CONTENT -->
<div class="main">

    <!-- TOP BAR -->
    <div class="topbar">

        <h4>{% block title %}Doctor Panel{% endblock %}</h4>

        <!-- NOTIFICATIONS -->
        <div class="dropdown">

            <button id="notificationBell"
                    class="btn btn-light position-relative"
                    data-bs-toggle="dropdown">

                🔔

                <span id="notificationCount"
                      class="badge bg-danger position-absolute top-0 start-100">
                    0
                </span>

            </button>

            <ul class="dropdown-menu dropdown-menu-end shadow">

                <div id="notificationList">
                    <li class="text-center text-muted p-2">
                        No Notifications
                    </li>
                </div>

            </ul>

        </div>

    </div>

    <!-- PAGE CONTENT -->
    <div class="content">

        {% block content %}
        {% endblock %}

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="{% static 'js/common.js' %}"></script>
<script src="{% static 'js/auth.js' %}"></script>
<script src="{% static 'js/auth-guard.js' %}"></script>
<script src="{% static 'js/notifications.js' %}"></script>

</body>
</html>
