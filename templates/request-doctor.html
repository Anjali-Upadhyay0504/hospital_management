{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Request To Become Doctor</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-7">

            <div class="card shadow border-0">

                <div class="card-header bg-success text-white">

                    <h4 class="mb-0">

                        <i class="bi bi-person-badge-fill"></i>

                        Request To Become Doctor

                    </h4>

                </div>

                <div class="card-body">

                    <!-- Status -->
                    <div
                        id="requestStatus"
                        class="alert d-none">
                    </div>

                    <!-- Form -->
                    <form id="doctorRequestForm">

                        <div class="mb-3">

                            <label class="form-label">

                                Specialization

                            </label>

                            <input
                                type="text"
                                id="specialization"
                                class="form-control"
                                required>

                        </div>
                        <div class="mb-3">
                            <label class="form-label">
                                Qualification
                            </label>

                            <input
                                type="text"
                                id="qualification"
                                class="form-control"
                                placeholder="Qualification"
                                required>
                        </div>
                        <div class="mb-3">

                            <label class="form-label">

                                Experience (Years)

                            </label>

                            <input
                                type="number"
                                id="experience"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Consultation Fee

                            </label>

                            <input
                                type="number"
                                id="fee"
                                class="form-control"
                                required>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-success w-100">

                            Submit Request

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="{% static 'js/common.js' %}"></script>
<script src="{% static 'js/auth.js' %}"></script>
<script src="{% static 'js/auth-guard.js' %}"></script>
<script src="{% static 'js/request-doctor.js' %}"></script>

</body>
</html>
