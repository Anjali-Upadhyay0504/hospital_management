{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Doctor Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/doctordashboard.css' %}">
</head>

<body>

<div class="container mt-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>👨‍⚕️ Doctor Dashboard</h2>

        <ul class="dropdown-menu dropdown-menu-end shadow"
    style="width:350px; max-height:400px; overflow-y:auto;">

    <li class="dropdown-header fw-bold">
        Notifications
    </li>

    <li><hr class="dropdown-divider"></li>

    <div id="notificationList">

        <li class="dropdown-item text-center text-muted">
            No Notifications
        </li>

    </div>

    <li><hr class="dropdown-divider"></li>

    <li>

        <a href="/doctor/notifications/"
           class="dropdown-item text-center text-primary">

            View All Notifications

        </a>

    </li>

</ul>
    </div>

    <!-- SUMMARY CARDS ONLY -->
    <div class="row g-4">

        <div class="col-md-4">
            <div class="card p-3 text-center shadow-sm">
                <h5>Total Appointments</h5>
                <h2 id="totalAppointments">0</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 text-center shadow-sm">
                <h5>Today's Appointments</h5>
                <h2 id="todayAppointments">0</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 text-center shadow-sm">
                <h5>Pending Appointments</h5>
                <h2 id="pendingReports">0</h2>
            </div>
        </div>

    </div>

    <!-- NAVIGATION CARDS -->
    <div class="row mt-5 g-4">

        <div class="col-md-4">
            <a href="/doctor/appointments/" class="text-decoration-none">
                <div class="card p-4 text-center shadow-sm">
                    📅 <h5>Appointments</h5>
                </div>
            </a>
        </div>

        <div class="col-md-4">
            <a href="/doctor/schedule/" class="text-decoration-none">
                <div class="card p-4 text-center shadow-sm">
                    🗓 <h5>Schedule</h5>
                </div>
            </a>
        </div>

        <div class="col-md-4">
            <a href="/doctor/prescriptions/" class="text-decoration-none">
                <div class="card p-4 text-center shadow-sm">
                    💊 <h5>Prescriptions</h5>
                </div>
            </a>
        </div>

    </div>

</div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="{% static 'js/common.js' %}"></script>
<script src="{% static 'js/auth.js' %}"></script>
<script src="{% static 'js/auth-guard.js' %}"></script>
<script src="{% static 'js/notifications.js' %}"></script>
<script src="{% static 'js/doctor.js' %}"></script>
</body>
</html>
