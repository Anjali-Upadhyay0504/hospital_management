{% load static %}
<!DOCTYPE html>
<html>
<head>

    <title>Doctor Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>
<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between">

        <h2>Doctor Dashboard</h2>

        <button onclick="logout()" class="btn btn-danger">
            Logout
        </button>

    </div>

    <hr>

    <!-- 🔥 TABS BUTTONS -->
    <div class="btn-group mb-3">

        <button class="btn btn-primary" onclick="showTab('appointments')">
            Appointments
        </button>

        <button class="btn btn-secondary" onclick="showTab('schedule')">
            Schedule
        </button>

        <button class="btn btn-info" onclick="showTab('prescription')">
            Prescription
        </button>

    </div>

    <!-- ================= APPOINTMENTS ================= -->
    <div id="appointmentsTab">

        <h4>My Appointments</h4>

        <table class="table table-bordered">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Patient</th>
                    <th>Date</th>
                    <th>Reason</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="appointmentTable"></tbody>

        </table>

    </div>

    <!-- ================= SCHEDULE ================= -->
    <div id="scheduleTab" style="display:none;">

        <h4>My Schedule</h4>

        <table class="table table-bordered">

            <thead>
                <tr>
                    <th>Day</th>
                    <th>Start Time</th>
                    <th>End Time</th>
                </tr>
            </thead>

            <tbody id="scheduleTable"></tbody>

        </table>

    </div>

    <!-- ================= PRESCRIPTION ================= -->
    <div id="prescriptionTab" style="display:none;">

        <h4>Prescription</h4>

        <p>Prescription management will be here.</p>

    </div>

</div>

<script src="{% static 'js/doctor.js' %}"></script>

</body>
</html>
