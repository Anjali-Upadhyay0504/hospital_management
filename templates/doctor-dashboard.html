{% load static %}
<!DOCTYPE html>
<html>
<head>

    <title>Doctor Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>
<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between">

        <h2>Doctor Dashboard</h2>

        <button onclick="logout()" class="btn btn-danger">
            Logout
        </button>

    </div>

    <hr>

    <!-- 🔥 TABS BUTTONS -->
    <div class="btn-group mb-3">

        <button class="btn btn-primary" onclick="showTab('appointments')">
            Appointments
        </button>

        <button class="btn btn-secondary" onclick="showTab('schedule')">
            Schedule
        </button>

        <button class="btn btn-info" onclick="showTab('prescription')">
            Prescription
        </button>

    </div>

    <!-- ================= APPOINTMENTS ================= -->
    <div id="appointmentsTab">

        <h4>My Appointments</h4>

        <table class="table table-bordered">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Patient</th>
                    <th>Date</th>
                    <th>Reason</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="appointmentTable"></tbody>

        </table>

    </div>

   <!-- ================= SCHEDULE ================= -->
<div id="scheduleTab" style="display:none;">

    <h4>My Schedule</h4>

    <!-- ADD SCHEDULE FORM -->
    <div class="card p-3 mb-3">

        <h5>Add Schedule</h5>

        <div class="row">

            <!-- DAY DROPDOWN (IMPORTANT FIX) -->
            <div class="col-md-3">

                <select id="scheduleDay" class="form-control">

                    <option value="">Select Day</option>

                    <option value="mon">Monday</option>
                    <option value="tue">Tuesday</option>
                    <option value="wed">Wednesday</option>
                    <option value="thu">Thursday</option>
                    <option value="fri">Friday</option>
                    <option value="sat">Saturday</option>
                    <option value="sun">Sunday</option>

                </select>

            </div>

            <!-- START TIME -->
            <div class="col-md-3">

                <input 
                    type="time"
                    id="startTime"
                    class="form-control"
                >

            </div>

            <!-- END TIME -->
            <div class="col-md-3">

                <input 
                    type="time"
                    id="endTime"
                    class="form-control"
                >

            </div>

            <!-- BUTTON -->
            <div class="col-md-3">

                <button 
                    class="btn btn-success w-100"
                    onclick="addSchedule()">

                    Add Schedule

                </button>

            </div>

        </div>

    </div>

    <!-- SCHEDULE TABLE -->
    <table class="table table-bordered">

        <thead class="table-dark">

            <tr>
                <th>Day</th>
                <th>Start Time</th>
                <th>End Time</th>
            </tr>

        </thead>

        <tbody id="scheduleTable"></tbody>

    </table>

</div>

    <!-- ================= PRESCRIPTION ================= -->
    <div id="prescriptionTab" style="display:none;">

        <h4>Prescription</h4>

        <p>Prescription management will be here.</p>

    </div>

</div>

<script src="{% static 'js/doctor.js' %}"></script>

</body>
</html>
