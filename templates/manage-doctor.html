{% load static %}
<!DOCTYPE html>
<html>
<head>

    <title>Manage Doctors</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>
<body>

<div class="container mt-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center">

        <h2>Manage Doctors</h2>

        <a href="/admin-dashboard/" class="btn btn-secondary">
            Dashboard
        </a>

    </div>

    <hr>

    <!-- SEARCH -->
    <input type="text"
           id="searchDoctor"
           class="form-control mb-3"
           placeholder="Search doctor (name/specialization)">

    <!-- ADD DOCTOR FORM -->
    <div class="card p-3 mb-4">

        <h5>Add Doctor</h5>

        <div class="row">

            <div class="col-md-3">
                <input id="user_id" class="form-control" placeholder="User ID">
            </div>

            <div class="col-md-3">
                <input id="specialization" class="form-control" placeholder="Specialization">
            </div>

            <div class="col-md-2">
                <input id="experience" class="form-control" placeholder="Experience">
            </div>

            <div class="col-md-2">
                <input id="fee" class="form-control" placeholder="Fee">
            </div>

            <div class="col-md-2">
                <button class="btn btn-primary w-100" onclick="addDoctor()">
                    Add
                </button>
            </div>

        </div>

    </div>

    <!-- TABLE -->
    <table class="table table-bordered table-hover">

        <thead class="table-dark">

            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Specialization</th>
                <th>Experience</th>
                <th>Fee</th>
                <th>Available</th>
                <th>Actions</th>
            </tr>

        </thead>

        <tbody id="doctorTable"></tbody>

    </table>

</div>

<script src="{% static 'js/manage-doctor.js' %}"></script>

</body>
</html>
