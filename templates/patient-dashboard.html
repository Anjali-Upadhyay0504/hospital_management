{% load static %}
<!DOCTYPE html>
<html>
<head>

    <title>Patient Dashboard</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>
<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between">

        <h2>
            Patient Dashboard
        </h2>

        <button
            onclick="logout()"
            class="btn btn-danger">

            Logout

        </button>

    </div>

    <hr>
<!-- Become Doctor -->

<div class="card p-4 mb-4">

    <h4>Become a Doctor</h4>

    <input
        type="text"
        id="specialization"
        class="form-control mb-3"
        placeholder="Specialization">

    <input
        type="number"
        id="experience"
        class="form-control mb-3"
        placeholder="Experience (Years)">

    <input
        type="text"
        id="qualification"
        class="form-control mb-3"
        placeholder="Qualification">
    <input type="number" id="fee" placeholder="Expected Fee">
    <button
        class="btn btn-success"
        onclick="requestDoctor()">

        Submit Doctor Request

    </button>

    <div
        id="doctorRequestMessage"
        class="mt-3">
    </div>

</div>
    <!-- Book Appointment -->

    <div class="card p-4 mb-4">

        <h4>
            Book Appointment
        </h4>

        <select
            id="doctorSelect"
            class="form-select mb-3">

            <option>
                Select Doctor
            </option>

        </select>

        <input
            type="datetime-local"
            id="appointmentDate"
            class="form-control mb-3">

        <textarea
            id="reason"
            class="form-control mb-3"
            placeholder="Reason">
        </textarea>

        <button
            onclick="bookAppointment()"
            class="btn btn-primary">

            Book

        </button>

    </div>

    <!-- My Appointments -->

    <div class="card p-4 mb-4">

        <h4>
            My Appointments
        </h4>

        <table class="table">

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Doctor</th>
                    <th>Date</th>
                    <th>Status</th>

                </tr>

            </thead>

            <tbody id="appointmentTable">

            </tbody>

        </table>

    </div>

    <!-- My Prescriptions -->

    <div class="card p-4">

        <h4>
            My Prescriptions
        </h4>

        <table class="table">

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Doctor</th>
                    <th>Medicine</th>
                    <th>Instructions</th>

                </tr>

            </thead>

            <tbody id="prescriptionTable">

            </tbody>

        </table>

    </div>

</div>

<script src="{% static 'js/patient.js' %}"></script>

</body>
</html>
