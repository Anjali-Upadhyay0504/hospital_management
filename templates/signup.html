{% load static %}
<!DOCTYPE html>
<html>
<head>

    <title>Signup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>
<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-4">

            <div class="card shadow p-4">

                <h3 class="text-center mb-4">Create Account</h3>

                <input id="username" class="form-control mb-3" placeholder="Username">

                <input id="password" type="password" class="form-control mb-3" placeholder="Password">

                <input id="confirm_password" type="password" class="form-control mb-3" placeholder="Confirm Password">

                <button onclick="signup()" class="btn btn-success w-100">
                    Signup
                </button>

                <p class="text-center mt-3">
                    Already have an account?
                    <a href="/login/">Login</a>
                </p>

                <div id="msg" class="text-center mt-2"></div>

            </div>

        </div>

    </div>

</div>
<script>
    window.BASE_URL = "http://127.0.0.1:8000";
</script>
<script src="{% static 'js/login.js' %}"></script>

</body>
</html>
